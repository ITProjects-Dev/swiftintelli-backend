services:
  backend:
    container_name: swiftintelli-backend

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket;s=socket.socket();s.connect(('127.0.0.1',8000));s.close()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      options:
        max-size: "10m"
        max-file: "3"